---
openapi: 3.0.1
info:
  title: Nordic Financial News API
  version: v1.0
  description: |
    REST API for accessing translated Nordic financial news articles and stories.

    ## Authentication
    All endpoints require Bearer token authentication using an API key.
    Include the API key in the Authorization header:
    ```
    Authorization: Bearer YOUR_API_KEY
    ```

    ## Rate Limiting
    The API is rate limited to 3600 requests per hour per API key.
    Rate limit information is included in response headers:
    - `X-RateLimit-Limit`: Maximum requests per hour
    - `X-RateLimit-Remaining`: Requests remaining
    - `X-RateLimit-Reset`: Seconds until limit resets

    ## Monthly Usage Limits
    Each API key has a monthly request allowance based on your plan:
    - **Free**: 50 requests/month
    - **Plus**: 10,000 requests/month
    - **Pro**: 50,000 requests/month

    Monthly usage information is included in response headers:
    - `X-Monthly-Limit`: Maximum requests per month
    - `X-Monthly-Remaining`: Requests remaining this month
    - `X-Monthly-Reset`: ISO 8601 timestamp when the limit resets (end of month)

    When the monthly limit is exceeded, the API returns `429 Too Many Requests` with a `Retry-After` header.

    ## Caching
    The API supports HTTP caching with ETags. Include the `If-None-Match`
    header with the ETag from a previous response to receive a 304 Not Modified
    response if the data hasn't changed.

    ## Pagination
    List endpoints support cursor-based pagination. Use the `cursor` parameter
    with the value from `pagination.next_cursor` in the response to fetch the next page.

    ## Error Handling
    Errors follow the RFC 9457 Problem Details format with appropriate HTTP status codes.
  contact:
    name: API Support
    email: api@nordicfinancialnews.com
paths:
  "/api/v1/articles/{public_id}":
    get:
      summary: Get article details
      tags:
      - Articles
      security:
      - bearer_auth: []
      description: Returns the full details of a single article, including AI-translated
        content, key points, associated companies, and topic tags. Supports conditional
        requests via `If-None-Match` for efficient caching.
      parameters:
      - name: public_id
        in: path
        required: true
        description: Article ID (e.g. `art_abc123def`).
        example: art_abc123def
        schema:
          type: string
      - name: If-None-Match
        in: header
        required: false
        description: ETag value from a previous response. Returns `304 Not Modified`
          if the article has not changed.
        schema:
          type: string
      responses:
        '200':
          description: Article found
          content:
            application/json:
              schema:
                type: object
                properties:
                  article:
                    "$ref": "#/components/schemas/ArticleDetail"
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/meta":
    get:
      summary: Get API metadata
      tags:
      - Meta
      security:
      - bearer_auth: []
      description: Returns API metadata including version, capabilities, supported
        fields, content types, and rate limit policy.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      responses:
        '200':
          description: API metadata retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: v1
                  capabilities:
                    type: array
                    items:
                      type: string
                  supported_fields:
                    type: object
                    properties:
                      articles:
                        type: array
                        items:
                          type: string
                      stories:
                        type: array
                        items:
                          type: string
                      categories:
                        type: array
                        items:
                          type: string
                      companies:
                        type: array
                        items:
                          type: string
                      countries:
                        type: array
                        items:
                          type: string
                      exchanges:
                        type: array
                        items:
                          type: string
                  content_types:
                    type: array
                    items:
                      type: string
                  rate_limit_policy:
                    type: string
                  supported_countries:
                    type: array
                    items:
                      type: string
                  supported_scopes:
                    type: array
                    items:
                      type: string
                required:
                - version
                - capabilities
                - supported_fields
                - content_types
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/search":
    get:
      summary: Search across all resource types
      tags:
      - Search
      security:
      - bearer_auth: []
      description: Performs a unified full-text search across articles, stories, companies,
        countries, and exchanges. Results are grouped by resource type and ordered
        by relevance within each group. Only returns results for resource types that
        the API key has access to (based on scopes). Use `type` to limit which resource
        types are searched. Ideal for building typeahead or global search experiences.
      parameters:
      - name: q
        in: query
        required: true
        description: Full-text search query (2-200 characters).
        example: Volvo
        schema:
          type: string
      - name: type
        in: query
        required: false
        description: 'Comma-separated list of resource types to search. Defaults to
          all types. Valid values: `articles`, `stories`, `companies`, `countries`,
          `exchanges`.'
        example: articles,companies
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Maximum number of results per resource type (default 5, max 25).
        example: 5
        schema:
          type: integer
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SearchResult"
        '400':
          description: Invalid search query
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/stories":
    get:
      summary: List stories
      tags:
      - Stories
      security:
      - bearer_auth: []
      description: Returns a paginated list of published stories ordered by publication
        date (newest first). Stories are AI-generated clusters of related articles
        about the same event or topic. Supports filtering by country, category, and
        company ticker. Use `updated_after` for incremental syncing, or `q` for full-text
        search ranked by relevance.
      parameters:
      - name: limit
        in: query
        required: false
        description: Number of stories to return per page (default 25, max 100).
        example: 25
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor returned as `pagination.next_cursor`
          from a previous response. Mutually exclusive with `q`.
        schema:
          type: string
      - name: updated_after
        in: query
        required: false
        description: 'ISO 8601 datetime. Returns only stories updated after this timestamp.
          Use this for polling-based real-time updates: store the timestamp of your
          last sync, then request only newer results on each poll (see the Real-Time
          Updates guide at /api-docs). Disables cursor pagination — all matching results
          are returned in a single response.'
        example: '2024-01-01T00:00:00Z'
        schema:
          type: string
      - name: q
        in: query
        required: false
        description: Full-text search query (2-200 characters). Results are ranked
          by relevance instead of publication date. Mutually exclusive with `cursor`.
          Disables caching.
        example: Volvo earnings
        schema:
          type: string
      - name: country
        in: query
        required: false
        description: Filter by country using ISO 3166-1 alpha-2 code (e.g. `SE`, `NO`,
          `DK`).
        example: SE
        schema:
          type: string
      - name: category
        in: query
        required: false
        description: Filter by category ID.
        example: cat_earnings1
        schema:
          type: string
      - name: ticker
        in: query
        required: false
        description: Filter by company stock ticker symbol. Returns stories mentioning
          the company.
        example: VOLV-B
        schema:
          type: string
      - name: published_after
        in: query
        required: false
        description: ISO 8601 datetime. Returns stories published on or after this
          timestamp.
        example: '2024-06-01T00:00:00Z'
        schema:
          type: string
      - name: published_before
        in: query
        required: false
        description: ISO 8601 datetime. Returns stories published before this timestamp.
        example: '2024-12-31T23:59:59Z'
        schema:
          type: string
      - name: fields
        in: query
        required: false
        description: 'Comma-separated list of fields to include in the response. Available
          fields: `id`, `title`, `summary`, `published_at`, `article_count`, `article_ids`,
          `country`, `category`, `topics`, `companies`.'
        example: id,title,summary,published_at
        schema:
          type: string
      - name: If-None-Match
        in: header
        required: false
        description: ETag value from a previous response. Returns `304 Not Modified`
          if data has not changed.
        schema:
          type: string
      responses:
        '200':
          description: Stories retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  stories:
                    type: array
                    items:
                      "$ref": "#/components/schemas/StorySummary"
                  pagination:
                    type: object
                    properties:
                      count:
                        type: integer
                        example: 25
                      next_cursor:
                        type: string
                        nullable: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/stories/{public_id}":
    get:
      summary: Get story details
      tags:
      - Stories
      security:
      - bearer_auth: []
      description: Returns the full details of a single story, including AI-generated
        content in Markdown format, associated articles, companies, and topic tags.
        Supports conditional requests via `If-None-Match` for efficient caching.
      parameters:
      - name: public_id
        in: path
        required: true
        description: Story ID (e.g. `sty_abc123def`).
        example: sty_abc123def
        schema:
          type: string
      - name: If-None-Match
        in: header
        required: false
        description: ETag value from a previous response. Returns `304 Not Modified`
          if the story has not changed.
        schema:
          type: string
      responses:
        '200':
          description: Story found
          content:
            application/json:
              schema:
                type: object
                properties:
                  story:
                    "$ref": "#/components/schemas/StoryDetail"
        '404':
          description: Story not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/stories/{public_id}/articles":
    get:
      summary: List articles in a story
      tags:
      - Stories
      security:
      - bearer_auth: []
      description: Returns the articles that belong to a story cluster, ordered by
        relevance score (most relevant first). Each article includes its full summary
        representation.
      parameters:
      - name: public_id
        in: path
        required: true
        description: Story ID.
        example: sty_abc123def
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Number of articles to return per page (default 25, max 100).
        example: 10
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor from a previous response.
        schema:
          type: string
      responses:
        '200':
          description: Articles retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      "$ref": "#/components/schemas/ArticleSummary"
        '404':
          description: Story not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/articles":
    get:
      summary: List articles
      tags:
      - Articles
      security:
      - bearer_auth: []
      description: Returns a paginated list of live, translated articles ordered by
        publication date (newest first). Supports filtering by country, category,
        company ticker, and content type. Use `updated_after` for incremental syncing,
        or `q` for full-text search ranked by relevance. Use `ids` for batch lookup
        of specific articles. Responses include cursor-based pagination and support
        field projection to minimize payload size.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Number of articles to return per page (default 25, max 100).
        example: 25
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor returned as `pagination.next_cursor`
          from a previous response. Mutually exclusive with `q`.
        schema:
          type: string
      - name: fields
        in: query
        required: false
        description: 'Comma-separated list of fields to include in the response. Reduces
          payload size. Available fields: `id`, `title`, `title_en`, `summary_en`,
          `article_url`, `content_type`, `published_at`, `story_ids`, `source`, `companies`,
          `country`, `category`, `image_url`.'
        example: id,title_en,summary_en,published_at
        schema:
          type: string
      - name: updated_after
        in: query
        required: false
        description: 'ISO 8601 datetime. Returns only articles updated after this
          timestamp. Use this for polling-based real-time updates: store the timestamp
          of your last sync, then request only newer results on each poll (see the
          Real-Time Updates guide at /api-docs). Disables cursor pagination — all
          matching results are returned in a single response.'
        example: '2024-01-01T00:00:00Z'
        schema:
          type: string
      - name: q
        in: query
        required: false
        description: Full-text search query (2-200 characters). Results are ranked
          by relevance instead of publication date. Mutually exclusive with `cursor`.
          Disables caching.
        example: Volvo earnings
        schema:
          type: string
      - name: country
        in: query
        required: false
        description: Filter by country using ISO 3166-1 alpha-2 code (e.g. `SE`, `NO`,
          `DK`).
        example: SE
        schema:
          type: string
      - name: ticker
        in: query
        required: false
        description: Filter by company stock ticker symbol. Returns articles mentioning
          the company.
        example: VOLV-B
        schema:
          type: string
      - name: content_type
        in: query
        required: false
        description: "Filter by article content type.:\n * `news` \n * `analysis`
          \n * `press_release` \n * `market_commentary` \n * `market_news` \n * `trading_halt`
          \n * `trading_event` \n * `other` \n "
        schema:
          type: string
          enum:
          - news
          - analysis
          - press_release
          - market_commentary
          - market_news
          - trading_halt
          - trading_event
          - other
          example: news
      - name: published_after
        in: query
        required: false
        description: ISO 8601 datetime. Returns articles published on or after this
          timestamp.
        example: '2024-06-01T00:00:00Z'
        schema:
          type: string
      - name: published_before
        in: query
        required: false
        description: ISO 8601 datetime. Returns articles published before this timestamp.
        example: '2024-12-31T23:59:59Z'
        schema:
          type: string
      - name: ids
        in: query
        required: false
        description: Comma-separated list of article IDs for batch lookup (max 100).
          Cannot be combined with `cursor` or `updated_after`.
        example: art_abc123,art_def456
        schema:
          type: string
      responses:
        '200':
          description: Articles retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        title_en:
                          type: string
                        summary_en:
                          type: string
                        article_url:
                          type: string
                        content_type:
                          type: string
                          enum:
                          - news
                          - analysis
                          - press_release
                          - market_commentary
                          - market_news
                          - trading_halt
                          - trading_event
                          - other
                        published_at:
                          type: string
                          format: date-time
                        story_ids:
                          type: array
                          items:
                            type: string
                        category:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                        source:
                          type: object
                          properties:
                            name:
                              type: string
                            domain:
                              type: string
                          required:
                          - name
                          - domain
                        companies:
                          type: array
                          items:
                            type: object
                        country:
                          type: string
                          nullable: true
                        image_url:
                          type: string
                          nullable: true
                      required:
                      - id
                      - title
                      - title_en
                      - category
                      - summary_en
                      - published_at
                      - article_url
                      - content_type
                      - story_ids
                      - source
                      - companies
                      - country
                required:
                - articles
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/categories":
    get:
      summary: List categories
      tags:
      - Categories
      security:
      - bearer_auth: []
      description: Returns all enabled article categories, ordered alphabetically
        by name. Categories are used to classify articles and stories (e.g. Earnings,
        M&A, IPO). Use category IDs to filter articles and stories by topic.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Number of categories to return per page (default 25, max 100).
        example: 25
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor from a previous response.
        schema:
          type: string
      - name: fields
        in: query
        required: false
        description: 'Comma-separated list of fields to include. Available fields:
          `id`, `name`, `description`.'
        example: id,name
        schema:
          type: string
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              examples:
                basic_response:
                  value:
                    categories:
                    - id: cat_business12
                      name: Business
                      description: General business news and updates.
                    - id: cat_tech123456
                      name: Technology
                      description: Technology sector news and innovations.
                    pagination:
                      count: 2
                      next_cursor:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      "$ref": "#/components/schemas/CategorySummary"
                  pagination:
                    type: object
                    properties:
                      count:
                        type: integer
                      next_cursor:
                        type: string
                        nullable: true
                required:
                - categories
        '401':
          description: unauthorized
        '403':
          description: forbidden - missing scope
  "/api/v1/categories/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Category ID
      schema:
        type: string
    get:
      summary: Get category details
      tags:
      - Categories
      security:
      - bearer_auth: []
      description: Returns details for a single category, including its description.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              examples:
                category_detail:
                  value:
                    category:
                      id: cat_business12
                      name: Business
                      description: General business news and updates.
              schema:
                type: object
                properties:
                  category:
                    "$ref": "#/components/schemas/CategorySummary"
                required:
                - category
        '404':
          description: not found
  "/api/v1/categories/{public_id}/articles":
    parameters:
    - name: public_id
      in: path
      required: true
      description: Category ID
      example: cat_business12
      schema:
        type: string
    get:
      summary: List category articles
      tags:
      - Categories
      security:
      - bearer_auth: []
      description: Returns articles classified under a specific category, ordered
        by publication date (newest first). Supports incremental syncing via `updated_after`
        and field projection.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Number of articles to return per page (default 25, max 100).
        example: 25
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor from a previous response.
        schema:
          type: string
      - name: updated_after
        in: query
        required: false
        description: ISO 8601 datetime. Returns only articles updated after this timestamp.
        example: '2024-01-01T00:00:00Z'
        schema:
          type: string
      - name: fields
        in: query
        required: false
        description: Comma-separated list of fields to include in the response.
        example: id,title_en,summary_en,published_at
        schema:
          type: string
      responses:
        '200':
          description: Category articles retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      "$ref": "#/components/schemas/ArticleSummary"
                  pagination:
                    type: object
                    properties:
                      count:
                        type: integer
                      next_cursor:
                        type: string
                        nullable: true
                required:
                - articles
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/categories/{public_id}/stories":
    parameters:
    - name: public_id
      in: path
      required: true
      description: Category ID
      example: cat_business12
      schema:
        type: string
    get:
      summary: List category stories
      tags:
