      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Number of stories to return per page (default 25, max 100).
        example: 25
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor from a previous response.
        schema:
          type: string
      - name: updated_after
        in: query
        required: false
        description: ISO 8601 datetime. Returns only stories updated after this timestamp.
        example: '2024-01-01T00:00:00Z'
        schema:
          type: string
      responses:
        '200':
          description: Category stories retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  stories:
                    type: array
                    items:
                      "$ref": "#/components/schemas/StorySummary"
                  pagination:
                    type: object
                    properties:
                      count:
                        type: integer
                      next_cursor:
                        type: string
                        nullable: true
