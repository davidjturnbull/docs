                - stories
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/problem_details"
  "/api/v1/companies":
    get:
      summary: List companies
      tags:
      - Companies
      security:
      - bearer_auth: []
      description: Returns a paginated list of verified Nordic companies, ordered
        alphabetically by name. Use `q` for full-text search across company names
        and aliases, ranked by relevance.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token for authentication
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Number of companies to return per page (default 25, max 100).
        example: 25
        schema:
          type: integer
      - name: cursor
        in: query
        required: false
        description: Opaque pagination cursor returned as `pagination.next_cursor`
          from a previous response. Mutually exclusive with `q`.
        schema:
          type: string
      - name: fields
        in: query
        required: false
        description: 'Comma-separated list of fields to include in the response. Available
          fields: `id`, `name`, `slug`, `ticker_symbol`.'
        example: id,name,ticker_symbol
        schema:
          type: string
      - name: q
        in: query
        required: false
        description: Full-text search query (2-200 characters). Searches company names
          and aliases. Results are ranked by relevance instead of alphabetical order.
          Mutually exclusive with `cursor`.
        example: Volvo
        schema:
          type: string
      responses:
        '200':
          description: Companies retrieved successfully
          content:
            application/json:
              examples:
