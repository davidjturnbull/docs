servers:
- url: http://localhost:3000
  description: Development server
- url: https://nordicfinancialnews.com/api/v1
  description: Production server
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API Key authentication using Bearer token
  schemas:
    problem_details:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - instance
      properties:
        type:
          type: string
          description: URI that identifies the problem type
          example: https://docs.nordicfinancialnews.com/problems/not-found
        title:
          type: string
          description: Short human-readable summary
          example: Not Found
        status:
          type: integer
          description: HTTP status code
          example: 404
        detail:
          type: string
          description: Human-readable explanation
          example: The requested resource could not be found
        instance:
          type: string
          description: URI that identifies the specific occurrence
          example: urn:request:abc123
    ArticleSummary:
      type: object
      required:
      - id
      - title
      - title_en
      - summary_en
      - published_at
      - article_url
      - source
      - content_type
      - category
      properties:
        id:
          type: string
          description: Unique article identifier
          example: art_abc123def
        title:
          type: string
          description: Original article title in source language
          example: Title
        title_en:
          type: string
          description: AI-translated English title
          example: Title
        summary_en:
          type: string
          description: AI-generated English summary
          example: Summary
        article_url:
          type: string
          description: URL to the original article on the source website
          example: https://example.com/articles/abc123def
        content_type:
          type: string
          description: Classification of the article content
          example: news
          enum:
          - news
          - analysis
          - press_release
          - market_commentary
          - market_news
          - trading_halt
          - trading_event
          - other
        published_at:
          type: string
          format: date-time
          description: When the article was originally published (ISO 8601)
        story_ids:
          type: array
          items:
            type: string
          description: IDs of stories this article belongs to
        category:
          type: object
          description: Article category
          properties:
            id:
              type: string
            name:
              type: string
        source:
          type: object
          description: The news source that published this article
          properties:
            name:
              type: string
              example: Source Name
            domain:
              type: string
              example: example.com
        companies:
          type: array
          description: Verified companies associated with the article
          items:
            type: object
            properties:
              id:
                type: string
                description: Company ID
              name:
                type: string
                description: Company name
              ticker_symbol:
                type: string
                nullable: true
                description: Full stock ticker including exchange suffix (e.g. VOLV-B.ST)
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 country code (e.g. SE, NO, DK)
          example: SE
        image_url:
          type: string
          nullable: true
          description: URL to the article's featured image, if available
    ArticleDetail:
      allOf:
      - "$ref": "#/components/schemas/ArticleSummary"
      - type: object
        properties:
          updated_at:
            type: string
            format: date-time
            description: When the article was last updated (ISO 8601)
          key_points:
            type: array
            items:
              type: string
            description: AI-extracted key points from the article
          topics:
            type: array
            items:
              type: string
            description: Topics associated with this article
    StorySummary:
      type: object
      required:
      - id
      - title
      - summary
      - article_count
      - published_at
      properties:
        id:
          type: string
          description: Unique story identifier
        title:
          type: string
          description: AI-generated story title
        summary:
          type: string
          description: AI-generated story summary
        article_count:
          type: integer
          description: Number of articles in this story cluster
        published_at:
          type: string
          format: date-time
          description: When the story was first published (ISO 8601)
        article_ids:
          type: array
          items:
            type: string
          description: IDs of articles belonging to this story
        country:
          type: string
          nullable: true
          description: Primary country associated with the story (ISO 3166-1 alpha-2)
        topics:
          type: array
          items:
            type: string
          description: Topics associated with this story
        companies:
          type: array
          description: Verified companies associated with the story
          items:
            type: object
            properties:
              id:
                type: string
                description: Company ID
              name:
                type: string
                description: Company name
              ticker_symbol:
                type: string
                nullable: true
                description: Full stock ticker including exchange suffix (e.g. VOLV-B.ST)
        category:
          type: object
          description: Story category
          properties:
            id:
              type: string
            name:
              type: string
    StoryDetail:
      allOf:
      - "$ref": "#/components/schemas/StorySummary"
      - type: object
        properties:
          content:
            type: string
            format: markdown
            description: Full AI-generated story content in Markdown format
          updated_at:
            type: string
            format: date-time
            description: When the story was last updated (ISO 8601)
          primary_article_id:
            type: string
            nullable: true
            description: ID of the primary/most relevant article in the story
    CategorySummary:
      type: object
      required:
      - id
      - name
      - description
      properties:
        id:
          type: string
          description: Unique category identifier
          example: cat_business12
        name:
          type: string
          description: Category display name
          example: Earnings & Financial Results
        description:
          type: string
          description: Brief description of the category
          example: Quarterly and annual earnings reports, profit warnings, revenue
            announcements, financial guidance, dividend declarations, and other corporate
            financial disclosures.
    CompanySummary:
      type: object
      required:
      - id
      - name
      - slug
      properties:
        id:
          type: string
          description: Unique company identifier
          example: comp_apple123
        name:
          type: string
          description: Company display name
          example: Apple Inc.
        slug:
          type: string
          description: URL-friendly company name
          example: apple-inc
        ticker_symbol:
          type: string
          nullable: true
          description: Full stock ticker including exchange suffix (null if unlisted)
          example: VOLV-B.ST
        exchange:
          type: object
          nullable: true
          description: Primary exchange where the company is listed
          properties:
            id:
              type: string
              description: Exchange identifier
            name:
              type: string
              description: Exchange display name
            mic_code:
              type: string
              description: ISO 10383 Market Identifier Code
    CompanyDetail:
      allOf:
      - "$ref": "#/components/schemas/CompanySummary"
      - type: object
        properties:
          composite_figi:
            type: string
            nullable: true
            description: Composite FIGI identifier
          aliases:
            type: array
            items:
              type: string
            description: Alternative names for the company
            example:
            - Apple Computer
            - Apple Computer Inc.
          article_count:
            type: integer
            description: Number of live articles mentioning this company
            example: 42
          story_count:
            type: integer
            description: Number of published stories mentioning this company
            example: 15
          stock_listings:
            type: array
            description: All stock listings for this company across exchanges
            items:
              type: object
              properties:
                ticker_symbol:
                  type: string
                  description: Ticker symbol on this exchange
                ticker_root:
                  type: string
                  nullable: true
                  description: Root ticker without share class suffix
                full_ticker:
                  type: string
                  nullable: true
                  description: Full ticker including exchange suffix
                share_class_figi:
                  type: string
                  nullable: true
                  description: Share class FIGI identifier
                isin:
                  type: string
                  nullable: true
                  description: ISIN code
                currency:
                  type: string
                  nullable: true
                  description: Trading currency (ISO 4217)
                primary:
                  type: boolean
                  description: Whether this is the primary listing
                exchange:
                  type: object
                  nullable: true
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    mic_code:
                      type: string
    CountrySummary:
      type: object
      required:
      - id
      - name
      - iso2_code
      properties:
        id:
          type: string
          description: Unique country identifier
          example: ctry_sweden12
        name:
          type: string
          description: Country display name
          example: Sweden
        iso2_code:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: SE
    ExchangeSummary:
      type: object
      required:
      - id
      - name
      - mic_code
      properties:
        id:
          type: string
          description: Unique exchange identifier
          example: exch_nasdaq1
        name:
          type: string
          description: Exchange display name
          example: Nasdaq Stockholm
        mic_code:
          type: string
          description: ISO 10383 Market Identifier Code
          example: XSTO
        acronym:
          type: string
          nullable: true
          description: Exchange acronym
          example: NASDAQ
        country:
          type: object
          description: Country where the exchange is located
          properties:
            id:
              type: string
            name:
              type: string
            iso2_code:
              type: string
    ExchangeDetail:
      allOf:
      - "$ref": "#/components/schemas/ExchangeSummary"
      - type: object
        properties:
          operating_mic_code:
            type: string
            nullable: true
            description: Parent operating MIC code (for segment exchanges)
            example: XSTO
          currency:
            type: string
            nullable: true
            description: Primary trading currency (ISO 4217)
            example: SEK
          ticker_suffix:
            type: string
            nullable: true
            description: Ticker suffix used for this exchange
            example: ST
          timezone:
            type: string
            nullable: true
            description: Exchange timezone
            example: Europe/Stockholm
          website:
            type: string
            nullable: true
            description: Exchange website URL
          city:
            type: string
            nullable: true
            description: City where the exchange is located
    SearchResult:
      type: object
      required:
      - results
      - pagination
      properties:
        results:
          type: object
          properties:
            articles:
              type: array
              items:
                "$ref": "#/components/schemas/ArticleSummary"
            stories:
              type: array
              items:
                "$ref": "#/components/schemas/StorySummary"
            companies:
              type: array
              items:
                "$ref": "#/components/schemas/CompanySummary"
            countries:
              type: array
              items:
                "$ref": "#/components/schemas/CountrySummary"
            exchanges:
              type: array
              items:
                "$ref": "#/components/schemas/ExchangeSummary"
        pagination:
          type: object
          properties:
            articles:
              type: object
              properties:
                count:
                  type: integer
                limit:
                  type: integer
            stories:
              type: object
              properties:
                count:
                  type: integer
                limit:
                  type: integer
            companies:
              type: object
              properties:
                count:
                  type: integer
                limit:
                  type: integer
            countries:
              type: object
              properties:
                count:
                  type: integer
                limit:
                  type: integer
            exchanges:
              type: object
              properties:
                count:
                  type: integer
                limit:
                  type: integer
